name: Go Modules

permissions:
    contents: read

on:
    push:
        branches:
            - main
            - release-*
            - v*
        paths:
            - glide-core/src/**
            - glide-core/redis-rs/redis/src/**
            - ffi/src/**
            - go/integTest/vss_module_test.go
            - go/integTest/json_module_test.go
            - go/servermodules/**
            - go/options/json_options.go
            - .github/workflows/go-modules.yml
            - .github/workflows/install-shared-dependencies/action.yml
            - .github/workflows/install-engine/action.yml
            - .github/workflows/start-valkey-docker/action.yml
    pull_request:
        paths:
            - glide-core/src/**
            - glide-core/redis-rs/redis/src/**
            - ffi/src/**
            - go/integTest/vss_module_test.go
            - go/integTest/json_module_test.go
            - go/servermodules/**
            - go/options/json_options.go
            - .github/workflows/go-modules.yml
            - .github/workflows/install-shared-dependencies/action.yml
            - .github/workflows/install-engine/action.yml
            - .github/workflows/start-valkey-docker/action.yml
    workflow_dispatch:
        inputs:
            rc-version:
                required: false
                type: string
                description: "RC Version number (Format: vX.Y.Z or vX.Y.Z-rcN)"
            name:
                required: false
                type: string
                description: "(Optional) Test run name"
    workflow_call:

concurrency:
    group: go-modules-${{ github.head_ref || github.ref }}-${{ toJson(inputs) }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always
    BASE_GO_VERSION: "1.22"

run-name: ${{ github.event_name == 'workflow_dispatch' && (inputs.name == '' && format('{0} @ {1} {2}', github.ref_name, github.sha, toJson(inputs)) || inputs.name) || '' }}

jobs:
    test-modules-linux:
        name: Modules Tests (Linux)
        runs-on: ubuntu-latest
        timeout-minutes: 35
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.BASE_GO_VERSION }}
                  cache-dependency-path: go/go.sum

            - name: Install shared software dependencies
              uses: ./.github/workflows/install-shared-dependencies
              with:
                  os: ubuntu
                  target: x86_64-unknown-linux-gnu
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  engine-version: "9.0"

            - name: Start module servers via Docker
              uses: ./.github/workflows/start-valkey-docker
              with:
                  engine-version: "9.0"

            - uses: actions/cache@v4
              with:
                  path: |
                      ffi/target
                      glide-core/src/generated
                  key: x86_64-unknown-linux-gnu-go
                  restore-keys: |
                      x86_64-unknown-linux-gnu-glide-core
                      x86_64-unknown-linux-gnu

            - name: Build and run modules tests
              working-directory: go
              run: |
                  make install-tools build
                  make modules-test \
                    standalone-endpoints=${{ env.MODULES_STANDALONE_ENDPOINT }} \
                    cluster-endpoints=${{ env.MODULES_CLUSTER_ENDPOINTS }}

            - name: Upload test reports
              if: always()
              continue-on-error: true
              uses: actions/upload-artifact@v4
              with:
                  name: test-reports-modules-go-docker
                  path: |
                      go/reports/**

    test-modules:
        if: github.repository_owner == 'valkey-io' && github.event_name == 'workflow_dispatch'
        environment: AWS_ACTIONS
        name: Modules Tests
        runs-on: [self-hosted, linux, ARM64, persistent]
        timeout-minutes: 15
        steps:
            - name: Setup self-hosted runner access
              run: sudo chown -R $USER:$USER /home/ubuntu/actions-runner/_work/valkey-glide

            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.BASE_GO_VERSION }}
                  cache-dependency-path: go/go.sum

            - uses: actions/cache@v4
              with:
                  path: |
                      ffi/target
                      glide-core/src/generated
                  key: aarch64-unknown-linux-gnu-go
                  restore-keys: |
                      aarch64-unknown-linux-gnu-glide-core
                      aarch64-unknown-linux-gnu

            - name: Install zig
              uses: ./.github/workflows/install-zig

            - name: Run patch to test with RC
              working-directory: go
              if: ${{ github.event.inputs.rc-version }}
              env:
                  RC_VERSION: ${{ github.event.inputs.rc-version }}
              run: |
                  ./scripts/rc-testing/rc-test.sh "$RC_VERSION"

            - name: Build and test
              working-directory: ./go
              env:
                  RC_VERSION: ${{ github.event.inputs.rc-version }}
              run: |
                  if [[ -n "$RC_VERSION" ]]; then
                      make install-tools modules-test cluster-endpoints=${{ secrets.MEMDB_MODULES_ENDPOINT }} tls=true
                  else
                      make install-tools build modules-test cluster-endpoints=${{ secrets.MEMDB_MODULES_ENDPOINT }} tls=true
                  fi

            - name: Upload test reports
              if: always()
              continue-on-error: true
              uses: actions/upload-artifact@v4
              with:
                  name: test-reports-modules-go
                  path: |
                      go/reports/**
